<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Accessible HTML Example</title>
<link href="styles.css" rel="stylesheet"/>
</head>
<body>
<header>
<h1>Welcome to My Website</h1>
</header>
<main>
<p>This is a paragraph of text styled with CSS.</p>
<ul>
<li>
<strong>Walking in the park:
                </strong>
</li>
<li>
<br/>
<img alt="A scenic view of a sunlit path through a green city park" src="walking_in_the_park.jpg"/>
</li>
<li>
<strong>Warning: This video contains flashing lights (Epilepsy Trigger):</strong>
</li>
<li>
<br/>
<video> width="640" height="360" controls&gt;
                    <source src="epilepsy_flicker.mp4" type="video/mp4"/>
</video>
</li>
<li>
<strong>Me at the zoo (The first YouTube video):</strong>
</li>
<li>
<br/>
<video controls="" height="360" width="640">
<source src="me_at_the_zoo_flicker.mp4" type="video/mp4"/>
<track kind="captions" label="English" src="captions_en.vtt" srclang="en"/>
</video>
</li>
</ul>
</main>
</body>
</html>
